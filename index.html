<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default: Light Mode */
            --bg: #ffffff;
            --text: #666666;
            --highlight: #111111;
            --border: #eeeeee;
            --label-color: #999999;
            --mono: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
        }

        /* Automatic Switch to Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #999999;
                --highlight: #eeeeee;
                --border: #333333;
                --label-color: #555555;
            }
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transition if user toggles mode */
        }

        .container {
            max-width: 700px;
            width: 90%;
            padding: 40px;
        }

        h1 { 
            color: var(--highlight); 
            font-size: 42px; 
            font-weight: 300; 
            margin: 0 0 10px 0; 
            letter-spacing: -1px;
        }

        p {
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .data-grid {
            border-top: 1px solid var(--border);
            padding-top: 30px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px 30px;
            font-size: 14px;
        }

        .label { 
            font-weight: 600; 
            color: var(--label-color); 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-size: 11px;
            align-self: center;
        }

        .value { 
            font-family: var(--mono); 
            color: var(--highlight);
        }

        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: var(--label-color);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
        .footer a:hover { border-bottom-color: var(--text); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Access Restricted</h1>
        <p>The request was intercepted and dropped by the edge security policy. Access to <strong>o6nt.com</strong> is currently unavailable for this session.</p>

        <div class="data-grid">
            <div class="label">Client IP</div>
            <div class="value" id="user-ip">Detecting...</div>

            <div class="label">Reference</div>
            <div class="value" id="rid">...</div>

            <div class="label">Timestamp</div>
            <div class="value" id="ts">...</div>

            <div class="label">Status Code</div>
            <div class="value">403_ERR_ACL_REJECT</div>
        </div>

        <div class="footer">
            Gatekeeper &bull; <a href="mailto:admin@o6nt.com">Report a false positive</a>
        </div>
    </div>

    <script>
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                const forbidden = ["F12", "u", "I", "J", "C"];
                if (forbidden.includes(e.key) || (e.ctrlKey && e.shiftKey)) {
                    if (e.ctrlKey || e.key === "F12") e.preventDefault();
                }
            });

            const _rid = () => Math.random().toString(36).substring(2, 10).toUpperCase() + "-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            const _t = new Date().toISOString().replace('T', ' ').split('.')[0] + ' UTC';

            window.onload = function() {
                document.getElementById('ts').innerText = _t;
                document.getElementById('rid').innerText = _rid();

                fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => { document.getElementById('user-ip').innerText = data.ip; })
                    .catch(() => { document.getElementById('user-ip').innerText = "ENDPOINT_TIMEOUT"; });
            };
        })();
    </script>
</body>
</html>
